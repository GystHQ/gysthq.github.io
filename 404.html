<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#7ec0ee" />
    <title>Lost a block — Thomas Anakin's Games</title>
    <meta http-equiv="refresh" content="4; url=/" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Lilita+One&display=swap" rel="stylesheet" />
    <style>
      :root { --ink:#1d2330; --sun:#ffcf33; --sun-dark:#e3a81d; --cream:#fff6e6; }
      * { box-sizing: border-box; }
      body {
        margin: 0; min-height: 100vh; display: grid; place-items: center; gap: 0;
        background: linear-gradient(180deg, #8fccf3, #5aa9e6);
        color: var(--ink); font-family: 'Baloo 2', system-ui, sans-serif; font-weight: 700;
        text-align: center; padding: 24px;
      }
      .card {
        background: var(--cream); border: 4px solid var(--ink); border-radius: 24px;
        padding: 30px 30px 28px; max-width: 420px; box-shadow: 0 10px 0 var(--ink), 0 22px 36px rgba(29,35,48,.25);
      }
      svg { width: 84px; height: 84px; image-rendering: pixelated; border: 3px solid var(--ink); border-radius: 14px; margin-bottom: 14px; box-shadow: 0 4px 0 rgba(29,35,48,.25); }
      h1 { font-family: 'Lilita One', system-ui, sans-serif; font-weight: 400; font-size: 3.2rem; margin: 0 0 6px; color: var(--ink); }
      p { margin: 0 0 18px; color: #2b3340; line-height: 1.45; }
      a.btn {
        font-family: 'Lilita One', system-ui, sans-serif; font-size: 1.05rem; color: var(--ink);
        background: var(--sun); border: 3px solid var(--ink); border-radius: 12px;
        padding: 12px 20px; text-decoration: none; display: inline-block;
        box-shadow: 0 5px 0 var(--sun-dark), 0 5px 0 3px var(--ink);
      }
    </style>
  </head>
  <body>
    <div class="card">
      <svg viewBox="0 0 16 16" shape-rendering="crispEdges" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <rect width="16" height="16" fill="#7ec0ee"/>
        <rect x="3" y="1" width="10" height="1" fill="#6b4423"/><rect x="3" y="2" width="10" height="1" fill="#6b4423"/>
        <rect x="3" y="3" width="1" height="1" fill="#6b4423"/><rect x="4" y="3" width="8" height="1" fill="#f0c8a0"/><rect x="12" y="3" width="1" height="1" fill="#6b4423"/>
        <rect x="3" y="4" width="2" height="1" fill="#f0c8a0"/><rect x="5" y="4" width="1" height="1" fill="#fff"/><rect x="6" y="4" width="1" height="1" fill="#1d2330"/><rect x="7" y="4" width="2" height="1" fill="#f0c8a0"/><rect x="9" y="4" width="1" height="1" fill="#fff"/><rect x="10" y="4" width="1" height="1" fill="#1d2330"/><rect x="11" y="4" width="2" height="1" fill="#f0c8a0"/>
        <rect x="3" y="5" width="2" height="1" fill="#f0c8a0"/><rect x="5" y="5" width="2" height="1" fill="#1d2330"/><rect x="7" y="5" width="2" height="1" fill="#f0c8a0"/><rect x="9" y="5" width="2" height="1" fill="#1d2330"/><rect x="11" y="5" width="2" height="1" fill="#f0c8a0"/>
        <rect x="3" y="6" width="1" height="1" fill="#ef9f7e"/><rect x="4" y="6" width="8" height="1" fill="#f0c8a0"/><rect x="12" y="6" width="1" height="1" fill="#ef9f7e"/>
        <rect x="3" y="7" width="3" height="1" fill="#f0c8a0"/><rect x="6" y="7" width="1" height="1" fill="#9c4630"/><rect x="7" y="7" width="2" height="1" fill="#f0c8a0"/><rect x="9" y="7" width="1" height="1" fill="#9c4630"/><rect x="10" y="7" width="3" height="1" fill="#f0c8a0"/>
        <rect x="3" y="8" width="4" height="1" fill="#f0c8a0"/><rect x="7" y="8" width="2" height="1" fill="#9c4630"/><rect x="9" y="8" width="4" height="1" fill="#f0c8a0"/>
        <rect x="4" y="9" width="6" height="1" fill="#e0b088"/>
        <rect x="3" y="10" width="10" height="1" fill="#7a5230"/><rect x="2" y="11" width="12" height="1" fill="#7a5230"/>
        <rect x="2" y="12" width="5" height="1" fill="#7a5230"/><rect x="7" y="12" width="2" height="1" fill="#4a3019"/><rect x="9" y="12" width="5" height="1" fill="#7a5230"/>
        <rect x="2" y="13" width="5" height="1" fill="#7a5230"/><rect x="7" y="13" width="2" height="1" fill="#4a3019"/><rect x="9" y="13" width="5" height="1" fill="#7a5230"/>
        <rect x="3" y="14" width="10" height="1" fill="#7a5230"/>
      </svg>
      <h1>Lost a block!</h1>
      <p>That page wandered off the map. Taking you back home in a sec…</p>
      <a class="btn" href="/">Back to my games</a>
    </div>
  </body>
</html>
