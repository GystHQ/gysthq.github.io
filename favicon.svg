<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0e1622"/>
  <!-- hood -->
  <g fill="#7a5230">
    <rect x="6" y="4" width="14" height="4"/>
    <rect x="3" y="8" width="20" height="5"/>
    <rect x="3" y="13" width="5" height="9"/>
    <rect x="18" y="13" width="5" height="9"/>
    <rect x="2" y="22" width="22" height="7"/>
  </g>
  <g fill="#4a3019">
    <rect x="8" y="2" width="10" height="2"/>
    <rect x="12" y="22" width="2" height="7"/>
  </g>
  <!-- shadowed face -->
  <rect x="8" y="9" width="10" height="12" fill="#160f08"/>
  <!-- glowing force eyes -->
  <g fill="#66e0ff" filter="url(#g)">
    <rect x="9" y="13" width="3" height="2"/>
    <rect x="14" y="13" width="3" height="2"/>
  </g>
  <!-- lightsaber blade -->
  <g filter="url(#g)">
    <rect x="24" y="3" width="4" height="17" fill="#38a8ff"/>
    <rect x="25" y="3" width="2" height="17" fill="#cdebff"/>
  </g>
  <!-- hilt -->
  <rect x="24" y="20" width="4" height="2" fill="#c2c8d0"/>
  <rect x="24" y="22" width="4" height="7" fill="#9aa4b2"/>
  <g fill="#5b626e"><rect x="24" y="24" width="4" height="1"/><rect x="24" y="27" width="4" height="1"/></g>
</svg>
