<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg" shape-rendering="crispEdges">
  <defs>
    <filter id="g" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="0.9" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="6" fill="#0e1622"/>
  <!-- hair -->
  <rect x="8" y="3" width="12" height="3" fill="#6b4423"/>
  <!-- ears -->
  <g fill="#e0a87e"><rect x="7" y="9" width="1" height="3"/><rect x="20" y="9" width="1" height="3"/></g>
  <!-- face -->
  <rect x="8" y="6" width="12" height="10" fill="#f0c8a0"/>
  <!-- eyes -->
  <g fill="#241a10"><rect x="11" y="9" width="2" height="2"/><rect x="15" y="9" width="2" height="2"/></g>
  <g fill="#ffffff"><rect x="11" y="9" width="1" height="1"/><rect x="15" y="9" width="1" height="1"/></g>
  <!-- cheeks -->
  <g fill="#f0a888"><rect x="9" y="12" width="1" height="1"/><rect x="18" y="12" width="1" height="1"/></g>
  <!-- happy smile -->
  <g fill="#8a3b2a">
    <rect x="11" y="13" width="6" height="1"/>
    <rect x="10" y="12" width="1" height="1"/>
    <rect x="17" y="12" width="1" height="1"/>
  </g>
  <!-- neck -->
  <rect x="12" y="16" width="4" height="1" fill="#e0b088"/>
  <!-- brown robe (neck down) -->
  <rect x="5" y="17" width="14" height="9" fill="#7a5230"/>
  <rect x="11" y="17" width="2" height="9" fill="#4a3019"/>
  <!-- lightsaber blade -->
  <g filter="url(#g)">
    <rect x="23" y="4" width="4" height="15" fill="#38a8ff"/>
    <rect x="24" y="4" width="2" height="15" fill="#cdebff"/>
  </g>
  <!-- hilt -->
  <rect x="23" y="19" width="4" height="1" fill="#c2c8d0"/>
  <rect x="23" y="20" width="4" height="7" fill="#9aa4b2"/>
  <g fill="#5b626e"><rect x="23" y="22" width="4" height="1"/><rect x="23" y="25" width="4" height="1"/></g>
</svg>
